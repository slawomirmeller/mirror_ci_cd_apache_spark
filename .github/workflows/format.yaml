name: Format check

on:
  pull_request:
    branches: [main]

jobs:
  format:
    name: Black
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install black
        run: pip install black

      - name: Check formatting
        run: black --check src/ tests/